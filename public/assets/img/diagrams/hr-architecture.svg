<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="670" viewBox="0 120 1700 670" fill="none" role="img" aria-label="HR Management architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0A0A0A" />
      <stop offset="1" stop-color="#0A0A0A" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.55" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#FFFFFF" fill-opacity="0.82" />
    </marker>
    <style>
      .label { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #F4F4FF; }
      .muted { font: 500 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #B3B3C9; }
      .chip  { font: 600 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #C7C7DD; }
      .mono  { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: #B8B8CE; }
      .subtitle { font: 600 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #A1A1B7; letter-spacing: 2.2px; text-transform: uppercase; }
    </style>
  </defs>

  <rect x="0" y="120" width="1700" height="670" rx="34" fill="url(#bg)" />

  <!-- Normalize margins: consistent, minimal padding -->
  <g transform="translate(-48 28)">
  <!-- Left column: clients -->
  <g>
    <rect x="105" y="150" width="300" height="150" rx="18" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
    <text x="130" y="188" class="label">Web App</text>
    <text x="130" y="215" class="muted">Angular (HR portal)</text>
    <rect x="130" y="235" width="92" height="26" rx="13" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="142" y="253" class="chip">HTTPS</text>
    <rect x="230" y="235" width="140" height="26" rx="13" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="242" y="253" class="chip">JWT bearer</text>

    <rect x="105" y="335" width="300" height="150" rx="18" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
    <text x="130" y="373" class="label">Mobile App</text>
    <text x="130" y="400" class="muted">React Native (field)</text>
    <rect x="130" y="420" width="92" height="26" rx="13" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="142" y="438" class="chip">HTTPS</text>
    <rect x="230" y="420" width="140" height="26" rx="13" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="242" y="438" class="chip">JWT bearer</text>
  </g>

  <!-- Middle: security boundary -->
  <g>
    <rect x="470" y="225" width="300" height="185" rx="18" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
    <text x="495" y="266" class="label">Security boundary</text>
    <text x="495" y="294" class="muted">JWT validation</text>
    <text x="495" y="319" class="muted">Role-based access control (RBAC)</text>
    <text x="495" y="344" class="muted">Policy checks per endpoint</text>
    <rect x="495" y="364" width="250" height="28" rx="14" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="508" y="383" class="mono">Admin &#183; Manager &#183; Employee</text>
  </g>

  <!-- Right: ASP.NET Core API -->
  <g>
    <rect x="860" y="140" width="500" height="370" rx="20" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.6"/>
    <text x="890" y="180" class="subtitle">ASP.NET CORE API</text>

    <rect x="890" y="212" width="440" height="62" rx="14" fill="#0E0E12" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="915" y="240" class="label">API layer</text>
    <text x="915" y="263" class="muted">Endpoints used by web/mobile clients</text>

    <rect x="890" y="320" width="440" height="62" rx="14" fill="#0E0E12" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="915" y="348" class="label">Business / Domain layer</text>
    <text x="915" y="371" class="muted">Business logic &#183; workflows &#183; validation</text>

    <rect x="890" y="428" width="440" height="62" rx="14" fill="#0E0E12" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="915" y="456" class="label">Data layer</text>
    <text x="915" y="479" class="muted">Dapper queries &#183; repositories &#183; mapping</text>
  </g>

  <!-- AWS Lambda (same width as others) -->
  <g>
    <rect x="1390" y="168" width="300" height="150" rx="18" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
    <text x="1415" y="198" class="label">AWS Lambda</text>
    <text x="1415" y="222" class="muted">API project (serverless)</text>
    <text x="1415" y="246" class="muted">Cron: every 7 days</text>
    <rect x="1415" y="260" width="250" height="24" rx="12" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="1425" y="277" class="mono">Timesheets + reminder emails</text>
    <text x="1415" y="302" class="muted">Calls API layer</text>
  </g>

  <!-- Database (matches API width) -->
  <g>
    <rect x="860" y="555" width="500" height="150" rx="20" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
    <text x="890" y="600" class="label">PostgreSQL</text>
    <text x="890" y="628" class="muted">HR &#183; attendance &#183; payroll &#183; shifts &#183; tickets</text>
    <rect x="890" y="647" width="180" height="28" rx="14" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="904" y="666" class="mono">Indexes &#183; FK &#183; audit</text>
  </g>

  <!-- Arrows (orthogonal, consistent direction) -->
  <g stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="3" fill="none">
    <!-- Web -> Security -->
    <path d="M 405 225 L 430 225 L 430 270 L 470 270" marker-end="url(#arrow)"/>
    <!-- Mobile -> Security -->
    <path d="M 405 410 L 430 410 L 430 360 L 470 360" marker-end="url(#arrow)"/>
    <!-- Security -> API (API first) -->
    <path d="M 770 317 L 824 317 L 824 243 L 890 243" marker-end="url(#arrow)"/>
    <!-- Lambda -> API -->
    <path d="M 1390 243 L 1330 243" marker-end="url(#arrow)"/>
    <!-- API -> Business -->
    <path d="M 1110 274 L 1110 320" marker-end="url(#arrow)"/>
    <!-- Business -> Data -->
    <path d="M 1110 382 L 1110 428" marker-end="url(#arrow)"/>
  </g>

  <g stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="3" fill="none">
    <!-- Data -> DB -->
    <path d="M 1110 490 L 1110 555" marker-end="url(#arrow)"/>
  </g>
</g>
</svg>
