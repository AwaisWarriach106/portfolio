<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="670" viewBox="0 120 1700 670" fill="none" role="img" aria-label="Health Care Web App architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0A0A0A" />
      <stop offset="1" stop-color="#0A0A0A" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.55" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#FFFFFF" fill-opacity="0.82" />
    </marker>
    <style>
      .label { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #F4F4FF; }
      .muted { font: 500 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #B3B3C9; }
      .chip  { font: 600 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #C7C7DD; }
      .mono  { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: #B8B8CE; }
      .subtitle { font: 600 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #A1A1B7; letter-spacing: 2.2px; text-transform: uppercase; }
    </style>
  </defs>

  <rect x="0" y="120" width="1700" height="670" rx="34" fill="url(#bg)" />

  <!-- Normalize margins: consistent, minimal padding -->
  <g transform="translate(-48 28)">

    <!-- Left: client -->
    <g>
      <rect x="105" y="210" width="300" height="170" rx="18" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
      <text x="130" y="248" class="label">Web App</text>
      <text x="130" y="275" class="muted">React</text>
      <rect x="130" y="298" width="92" height="26" rx="13" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="142" y="316" class="chip">HTTPS</text>
      <rect x="230" y="298" width="140" height="26" rx="13" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="242" y="316" class="chip">JWT bearer</text>
    </g>

    <!-- Middle: security boundary -->
    <g>
      <rect x="470" y="210" width="300" height="170" rx="18" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
      <text x="495" y="248" class="label">Security boundary</text>
      <text x="495" y="276" class="muted">JWT authentication</text>
      <text x="495" y="301" class="muted">Role-based access control (RBAC)</text>
      <text x="495" y="326" class="muted">Policy checks per endpoint</text>
    </g>

    <!-- Core API: layered backend -->
    <g>
      <rect x="860" y="140" width="500" height="390" rx="20" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.6"/>
      <text x="890" y="180" class="subtitle">ASP.NET CORE API</text>

      <rect x="890" y="212" width="440" height="62" rx="14" fill="#0E0E12" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="915" y="240" class="label">API layer</text>
      <text x="915" y="263" class="muted">Endpoints used by the React web app</text>

      <rect x="890" y="320" width="440" height="62" rx="14" fill="#0E0E12" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="915" y="348" class="label">Domain layer</text>
      <text x="915" y="371" class="muted">Compliance logic &#183; workflows &#183; validation</text>

      <rect x="890" y="428" width="440" height="62" rx="14" fill="#0E0E12" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="915" y="456" class="label">Data layer</text>
      <text x="915" y="479" class="muted">Dapper for performance queries &#183; mapping</text>
    </g>

    <!-- External service: Data API -->
    <g>
      <rect x="1390" y="360" width="300" height="170" rx="18" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
      <text x="1415" y="400" class="label">Data API</text>
      <text x="1415" y="428" class="muted">Centralized metrics logic</text>
      <text x="1415" y="453" class="muted">Adherence calculations</text>
      <rect x="1415" y="473" width="250" height="26" rx="13" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="1427" y="491" class="chip">HTTP integration</text>
    </g>

    <!-- Nightly job: Patient Metrics -->
    <g>
      <rect x="1390" y="168" width="300" height="160" rx="18" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
      <text x="1415" y="208" class="label">Patient Metrics job</text>
      <text x="1415" y="234" class="muted">Scheduled service / Lambda</text>
      <text x="1415" y="258" class="muted">Nightly execution</text>
      <rect x="1415" y="276" width="250" height="28" rx="14" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="1427" y="295" class="mono">Compute flags + update DB</text>
    </g>

    <!-- Database -->
    <g>
      <rect x="860" y="555" width="500" height="150" rx="20" fill="#0B0B0D" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>
      <text x="890" y="600" class="label">PostgreSQL</text>
      <text x="890" y="628" class="muted">Patients &#183; metrics &#183; compliance flags</text>
      <rect x="890" y="647" width="250" height="28" rx="14" fill="#111115" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="904" y="666" class="mono">Precomputed flags for fast reads</text>
    </g>

    <!-- Arrows -->
    <g stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="3" fill="none">
      <!-- Web -> Security -->
      <path d="M 405 295 L 430 295 L 430 295 L 470 295" marker-end="url(#arrow)"/>
      <!-- Security -> API -->
      <path d="M 770 295 L 824 295 L 824 243 L 890 243" marker-end="url(#arrow)"/>
      <!-- API -> Domain -> Data -->
      <path d="M 1110 274 L 1110 320" marker-end="url(#arrow)"/>
      <path d="M 1110 382 L 1110 428" marker-end="url(#arrow)"/>
      <!-- Data layer -> DB -->
      <path d="M 1110 490 L 1110 555" marker-end="url(#arrow)"/>
      <!-- ASP.NET Core API -> Data API (HTTP) -->
      <path d="M 1360 445 L 1390 445" marker-end="url(#arrow)"/>
      <!-- Nightly job -> Data API -->
      <path d="M 1540 328 L 1540 360" marker-end="url(#arrow)"/>
      <!-- Data API -> DB (updates flags) -->
      <path d="M 1540 530 L 1540 630 L 1360 630" marker-end="url(#arrow)"/>
    </g>
  </g>
</svg>

